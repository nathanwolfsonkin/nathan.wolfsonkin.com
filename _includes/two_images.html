<div style="
  display: flex;
  justify-content: center;
  align-items: center;
  gap: {{ include.gap | default: '2rem' }};
  margin: 2rem 0;
  flex-wrap: wrap;
">
  <img 
    src="{{ include.src1 | relative_url }}" 
    alt="{{ include.alt1 | default: '' }}"
    style="width: {{ include.width1 | default: '45%' }}; height: auto;">

  <img 
    src="{{ include.src2 | relative_url }}" 
    alt="{{ include.alt2 | default: '' }}"
    style="width: {{ include.width2 | default: '45%' }}; height: auto;">
</div>
